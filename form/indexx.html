<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTasks - Professional Todo App</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">✓</span>
                    <span class="logo-text">FlowTasks</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-item active">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Dashboard</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">All Tasks</span>
                    <span class="nav-badge" id="totalTasksBadge">0</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">⭐</span>
                    <span class="nav-text">Important</span>
                    <span class="nav-badge" id="starredBadge">0</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">📅</span>
                    <span class="nav-text">Today</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">⚠️</span>
                    <span class="nav-text">Overdue</span>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <div class="user-name">John Doe</div>
                        <div class="user-email">john@example.com</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <h1 class="page-title">Dashboard</h1>
                    <div class="date-display" id="currentDate"></div>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" id="openAddTaskModal">
                        <span class="btn-icon">+</span>
                        New Task
                    </button>
                </div>
            </header>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📋</div>
                    <div class="stat-content">
                        <div class="stat-label">Total Tasks</div>
                        <div class="stat-value" id="totalTasks">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-content">
                        <div class="stat-label">Completed</div>
                        <div class="stat-value" id="completedTasks">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-content">
                        <div class="stat-label">In Progress</div>
                        <div class="stat-value" id="activeTasks">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⭐</div>
                    <div class="stat-content">
                        <div class="stat-label">Starred</div>
                        <div class="stat-value" id="starredTasks">0</div>
                    </div>
                </div>
            </div>

            <!-- Progress Section -->
            <div class="progress-section">
                <div class="progress-header">
                    <span class="progress-title">Overall Progress</span>
                    <span class="progress-percentage" id="progressPercentage">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters-section">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search tasks...">
                </div>
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">All</button>
                    <button class="filter-tab" data-filter="active">Active</button>
                    <button class="filter-tab" data-filter="completed">Completed</button>
                    <button class="filter-tab" data-filter="starred">Starred</button>
                </div>
            </div>

            <!-- Tasks List -->
            <div class="tasks-container">
                <div class="tasks-header">
                    <h2 class="tasks-title">Tasks</h2>
                    <button class="btn btn-outline" id="clearCompletedBtn">Clear Completed</button>
                </div>
                <div class="tasks-list" id="tasksList">
                    <!-- Tasks will be loaded here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Add Task Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Add New Task</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <div class="form-group">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-input" id="taskTitle" placeholder="Enter task title" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea class="form-input" id="taskDescription" rows="3" placeholder="Enter task description"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Priority</label>
                            <select class="form-input" id="taskPriority">
                                <option value="HIGH">🔴 High</option>
                                <option value="MEDIUM" selected>🟡 Medium</option>
                                <option value="LOW">🔵 Low</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select class="form-input" id="taskCategory">
                                <option value="WORK">💼 Work</option>
                                <option value="PERSONAL">🏠 Personal</option>
                                <option value="SHOPPING">🛒 Shopping</option>
                                <option value="HEALTH">❤️ Health</option>
                                <option value="EDUCATION">📚 Education</option>
                                <option value="OTHER">📌 Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Due Date</label>
                        <input type="datetime-local" class="form-input" id="taskDueDate">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Tags</label>
                        <input type="text" class="form-input" id="taskTags" placeholder="Enter tags separated by commas">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="cancelModal">Cancel</button>
                <button class="btn btn-primary" id="saveTask">Save Task</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="js/app.js"></script>
</body>
</html>
