<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Task Manager</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* --- CSS STYLING (The Professional Look) --- */
        :root {
            --primary-color: #2563eb;
            --bg-color: #0b253e;
            --text-color: #1e293b;
            --card-bg: #ffffff;
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        header p {
            font-size: 0.875rem;
            color: #64748b;
            margin-top: 4px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin: 1.5rem 0;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .primary-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .primary-btn:hover {
            opacity: 0.9;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.3s;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .task-text {
            font-size: 1rem;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .complete-btn, .delete-btn {
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 600;
        }

        .complete-btn { background: #dcfce7; color: #166534; }
        .delete-btn { background: #fee2e2; color: #991b1b; }

    </style>
</head>
<body>

    <main class="app-container">
        <header>
            <h1>My Workspace</h1>
            <p>Organize your goals efficiently</p>
        </header>

        <section class="input-group">
            <input type="text" id="todo-input" placeholder="Add a new task..." aria-label="New task">
            <button id="add-btn" class="primary-btn">Add</button>
        </section>

        <ul id="todo-list" class="task-list">
            </ul>
    </main>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        const inputField = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');

        function addTask() {
            const taskValue = inputField.value.trim();

            if (taskValue === "") return;

            const li = document.createElement('li');
            li.className = 'task-item';

            li.innerHTML = `
                <span class="task-text">${taskValue}</span>
                <div class="actions">
                    <button class="complete-btn">✓</button>
                    <button class="delete-btn">✕</button>
                </div>
            `;

            todoList.appendChild(li);
            inputField.value = "";

            // Mark Complete
            li.querySelector('.complete-btn').onclick = () => {
                li.classList.toggle('completed');
            };

            // Delete Task
            li.querySelector('.delete-btn').onclick = () => {
                li.remove();
            };
        }

        addBtn.onclick = addTask;

        inputField.onkeypress = (e) => {
            if (e.key === 'Enter') addTask();
        };
    </script>

</body>
</html>
